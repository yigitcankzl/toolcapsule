name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: make build
      - name: Test
        run: go test ./...
      - name: Smoke (doctor + demo)
        run: |
          ./bin/toolcapsule doctor
          ./bin/toolcapsule demo
