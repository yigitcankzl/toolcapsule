name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push the image to GHCR

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Cross-compile
        run: make release VERSION=${{ github.ref_name }}
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
      - name: Make GHCR package public
        env:
          # GITHUB_TOKEN can push the image. Some accounts require a classic PAT
          # with package admin/write permission to change GHCR visibility.
          GH_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ github.event.repository.name }}
        run: |
          owner_type=$(gh api "/users/${OWNER}" --jq .type)
          if [ "$owner_type" = "Organization" ]; then
            visibility_path="/orgs/${OWNER}/packages/container/${PACKAGE}/visibility/public"
          else
            visibility_path="/user/packages/container/${PACKAGE}/visibility/public"
          fi

          for attempt in 1 2 3 4 5; do
            if gh api --method PUT "$visibility_path"; then
              echo "GHCR package ${OWNER}/${PACKAGE} is public"
              exit 0
            fi
            echo "GHCR package not ready yet; retrying in 10s (${attempt}/5)"
            sleep 10
          done

          echo "Failed to make GHCR package public" >&2
          exit 1
